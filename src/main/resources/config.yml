# ==========================================
# Military Arsenal - General Configuration
# ==========================================

# Custom Mobs Configuration
# -----------------------------------
# spawn_chance: Chance (0.0 to 1.0) for a vanilla mob (Skeleton/Zombie/etc) to turn 
#               into one from this addon when spawning naturally.
#               VALUE 0: Completely disables natural spawning for this mob.
# health: Maximum health of the entity.
# damage: Attack damage (melee or base depending on the mob).
# movement_speed: Movement speed (e.g., 0.3 is normal, 0.4 is fast).

mobs:
  elite_ranger:
    spawn_chance: 0.2
    health: 75.0
    damage: 60.0 # Base damage for arrow scaling
    movement_speed: 0.35


  elite_killer:
    spawn_chance: 0.3
    health: 1000.0
    damage: 999999.0
    movement_speed: 0.1
    ability_cooldown_ms: 60000



  the_king:
    spawn_chance: 0.25
    health: 250.0
    damage: 150.0
    movement_speed: 0.13


  pusher:
    spawn_chance: 0.8
    health: 10.0
    movement_speed: 0.4
    knockback_multiplier: 5.0 # Horizontal knockback multiplier
    knockback_vertical: 1.0   # Vertical knockback force

  battle_witch:
    spawn_chance: 0.25
    health: 80.0
    movement_speed: 0.28

  juan:
    spawn_chance: 0.6
    health: 70.0
    movement_speed: 0.35

  rusty_crab:
    spawn_chance: 0.3
    health: 100.0
    damage: 15.0
    movement_speed: 0.45
    ability_radius: 7.0
    slowness_amplifier: 1
    blindness_amplifier: 1
    effect_duration: 100
    ability_cooldown_ms: 120000


  purple_guy:
    spawn_chance: 0.4
    health: 150.0
    damage: 10.0
    cinematic_chance: 0.4    # Probability of activating the cinematic when attacking
    cinematic_cooldown: 1200 # Cooldown time in TICKS (20 ticks = 1 second)
    cinematic_damage: 50.0   # Damage dealt during the cinematic

  heavy_gunner:
    health: 10000.0
    damage: 18.0
    movement_speed: 0.3
    max_damage_received: 1000.0 # Maximum damage that can be received per hit
    airstrike_damage: 150.0  # Damage from the airstrike explosion
    flashbang_duration: 100  # Blindness/slowness duration in ticks

# -----------------------------------
# Spawn Negator (Slimefun Machine)
# -----------------------------------
# This machine prevents the spawning of military mobs within its range.
spawn_negator:
  radius: 100                # Range in blocks to block spawns
  prevent_natural_spawn: true # Block natural spawning
  prevent_spawner_spawn: true # Block spawning from spawners
  prevent_egg_spawn: true     # Block spawning from spawn eggs
